spring:
  application:
    name: Sokha Care
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sokha_care}
    username: ${DB_USERNAME:sokha_care}
    password: ${DB_PASSWORD:sokha_care}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
  security:
    user:
      name: disabled
      password: disabled

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    issuer: ${JWT_ISSUER:Sokha Care}
    secret: ${JWT_SECRET:change-this-secret-to-at-least-32-characters}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:15m}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:7d}

logging:
  level:
    root: INFO
    com.sokhacare: DEBUG
